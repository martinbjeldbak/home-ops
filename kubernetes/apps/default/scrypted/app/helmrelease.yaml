---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrypted
spec:
  chartRef:
    kind: OCIRepository
    name: scrypted
  interval: 1h
  values:
    controllers:
      scrypted:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "iot",
                "namespace": "kube-system",
                "ips": ["192.168.30.21/24"],
                "mac": "c6:07:27:af:fb:54"
              }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/koush/scrypted
              tag: v0.144.1-noble-full
            env:
              SCRYPTED_INSECURE_PORT: &port 80
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 136m
                memory: 1024Mi
              limits:
                memory: 8192Mi
    defaultPodOptions:
      # k8s-2 can't pass tagged-VLAN macvlan traffic (version-independent fault, unresolved);
      # keep macvlan workloads off it, so k8s-0 and k8s-1 are both viable.
      # Detection is CPU-only: the pod requests no GPU, so no /dev/dri is injected and
      # OpenVINO AUTO resolves to CPU wherever it lands. NOTE: OpenVINO Mode (AUTO) is set
      # in the Scrypted UI, not in git.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["k8s-2"]
    service:
      app:
        ports:
          http:
            port: *port
            primary: true
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.martinbjeldbak.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          scrypted:
            app:
              - path: /server/volume
      cache:
        type: emptyDir
        globalMounts:
          - path: /.cache
      cache-npm:
        type: emptyDir
        globalMounts:
          - path: /.npm
      recordings:
        type: nfs
        server: alderaan.internal
        path: /volume4/scrypted
        globalMounts:
          - path: /recordings
