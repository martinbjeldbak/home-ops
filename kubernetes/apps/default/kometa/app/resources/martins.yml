---
collections:
  Romantic Comedies:
    plex_search:
      all:
        genre:
          - Romance
          - Comedy
    sort_title: "!020_Romantic Comedies"
    collection_order: critic_rating.desc
    summary: "Feel-good films that blend romance and laughs. A curated collection of the best romantic comedies."
    visible_home: true
    visible_shared: true
  The Lord of the Rings Extended Editions:
    plex_all: true
    filters:
      # Src: https://github.com/meisnate12/Plex-Meta-Manager-Configs/blob/b16bfc9e5dda2d7d5625dbce2826bfdfea3cf971/PMM/overlays/special_release.yml#L88
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bExtended\b'
      title: The Lord of the Rings

  The Lord of the Rings: # try to override existing collection to get rid of extended
    plex_all: true
    filters:
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bTheatrical\b'
      title: The Lord of the Rings

  The Hobbit Extended Editions:
    plex_all: true
    filters:
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bExtended\b'
      title: The Hobbit

  # 2022-08-11 NOTE: Might have to manually collection first, still unsure
  The Hobbit:
    plex_all: true
    filters:
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bTheatrical\b'
      title: The Hobbit

  Middle Earth Extended Editions:
    plex_all: true
    filters:
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bExtended\b'
      title.regex: '(?i)\b(The Lord of the Rings)|(The Hobbit)\b'

  # 2022-08-11 NOTE: Might have to manually collection first, still unsure
  Middle Earth:
    plex_all: true
    filters:
      filepath.regex:
        - '(?<=[0-9]{4}[)}>\]]\s).*\bTheatrical\b'
      title.regex: '(?i)\b(The Lord of the Rings)|(The Hobbit)\b'
