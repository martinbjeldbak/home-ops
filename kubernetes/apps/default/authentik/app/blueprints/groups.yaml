---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Access groups
# Models the per-application access groups. Only name + is_superuser are managed:
# `attributes` is intentionally left unmanaged because several groups carry
# plaintext credentials (e.g. *_password) that must not be committed to git.
# The built-in "authentik Admins" / "authentik Read-only" groups are managed by
# Authentik itself and deliberately omitted here.
entries:
  - model: authentik_core.group
    identifiers: {name: Adguard Home Users}
    attrs: {name: Adguard Home Users, is_superuser: false}
