---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Dawarich OAuth2 Provider and Application
context:
  authorization_flow: &authorization_flow !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
  invalidation_flow: &invalidation_flow !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  property_mappings: &property_mappings
    # Built-in OpenID scopes, referenced by name (not scope_name) because
    # scopes.yaml adds a second mapping that reuses the "email" scope_name.
    - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
    - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]
    # Replaces the default "email" scope with the variant that adds email_verified (see scopes.yaml)
    - !Find [authentik_providers_oauth2.scopemapping, [name, "ROMM & Dawarich email_verified fix"]]
  signing_key: &signing_key !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
entries:
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Provider for Dawarich
    attrs:
      name: Provider for Dawarich
      authorization_flow: *authorization_flow
      invalidation_flow: *invalidation_flow
      client_type: confidential
      client_id: !Env DAWARICH_CLIENT_ID
      client_secret: !Env DAWARICH_CLIENT_SECRET
      redirect_uris:
        - url: https://dawarich.martinbjeldbak.com/users/auth/openid_connect/callback
          matching_mode: strict
      grant_types:
        - authorization_code
        - refresh_token
      property_mappings: *property_mappings
      signing_key: *signing_key

  - model: authentik_core.application
    identifiers:
      slug: dawarich
    attrs:
      name: Dawarich
      slug: dawarich
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Provider for Dawarich]]
      policy_engine_mode: any
      group: Productivity
      meta_icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/dawarich.svg
      meta_description: Location history tracker
      open_in_new_tab: false
