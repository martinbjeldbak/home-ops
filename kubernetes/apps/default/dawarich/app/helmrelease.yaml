---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: dawarich
  values:
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app: &dawarich
            image:
              repository: docker.io/freikin/dawarich
              tag: 1.9.2@sha256:c8413c39fd17bc801d9823507ae5ac08cf4333c6de5cd110922dbca31d097372
            command:
              - "web-entrypoint.sh"
            args:
              - "bin/rails server -p 3000 -b 0.0.0.0"
            env:
              TIME_ZONE: Australia/Sydney
              RAILS_ENV: development
              REDIS_URL: "redis://{{ .Release.Name }}-redis:6379"
              DATABASE_HOST: "{{ .Release.Name }}-db-rw"
              DATABASE_NAME: "{{ .Release.Name }}_development"
              MIN_MINUTES_SPENT_IN_CITY: 60
              APPLICATION_HOSTS: "{{ .Release.Name }}.martinbjeldbak.com"
              APPLICATION_PROTOCOL: http
              ALLOW_EMAIL_PASSWORD_REGISTRATION: false
              ALLOW_EMAIL_PASSWORD_LOGIN: false
              REVERSE_GEOCODING_ENABLED: true
              SELF_HOSTED: true
              STORE_GEODATA: true
              SMTP_PORT: 25
              SMTP_DOMAIN: martinbjeldbak.com
              SMTP_FROM: "{{ .Release.Name }}@martinbjeldbak.com"
              PORT: &port 3000
              SIDEKIQ_METRICS_URL: http://127.0.0.1:9394/metrics
              OIDC_AUTO_REGISTER: true
              OIDC_PROVIDER_NAME: "Authentik"
              OIDC_ISSUER: "https://auth.martinbjeldbak.com/application/o/{{ .Release.Name }}/"
              OIDC_REDIRECT_URI: "https://{{ .Release.Name }}.martinbjeldbak.com/users/auth/openid_connect/callback"
            envFrom:
              - secretRef:
                  name: dawarich-secret
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "3Gi"
                cpu: "2000m"
          sidekiq:
            <<: *dawarich
            command:
              - "sidekiq-entrypoint.sh"
            resources:
              requests:
                memory: "512Mi"
                cpu: "50m"
              limits:
                memory: "3Gi"
                cpu: "150m"
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.martinbjeldbak.com"
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: dawarich
        globalMounts:
          - path: /var/app/public
            subPath: public
          - path: /var/app/storage
            subPath: storage
          - path: /dawarich_db_data
            subPath: dawarich_db_data
      watched:
        type: emptyDir
        globalMounts:
          - path: /var/app/tmp/imports/watched
